name: Build arch images on base image change

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  packages: write

env:
  BASE_IMAGE: quay.io/toolbx/arch-toolbox:latest

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure dirs
        run: mkdir -p .ci

      - name: Restore base digest cache
        uses: actions/cache@v4
        with:
          path: .ci/base-digest
          key: base-digest-${{ env.BASE_IMAGE }}
          restore-keys: |
            base-digest-

      - name: Get current base manifest digest
        id: base
        shell: bash
        run: |
          set -euo pipefail
          DIGEST="$(docker buildx imagetools inspect "${BASE_IMAGE}" --format '{{printf "%s" .Manifest.Digest}}')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "$DIGEST" > .ci/base-digest.new
          echo "Current base digest: $DIGEST"

      - name: Compare with previous digest
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          PREV=""
          if [ -f .ci/base-digest ]; then PREV="$(cat .ci/base-digest)"; fi
          CUR="${{ steps.base.outputs.digest }}"

          if [ -z "$PREV" ] || [ "$PREV" != "$CUR" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Base image changed (or first run)"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Base image unchanged"
          fi

      - name: Update stored digest
        if: steps.diff.outputs.changed == 'true'
        run: mv .ci/base-digest.new .ci/base-digest

  build:
    needs: check
    if: ${{ needs.check.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: arch-toolbox-paru
          - context: arch-scroll
          - context: arch-dms
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.context }}:latest
